<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI 发展日报 — 每日自动聚合 AI 领域最新资讯">
<meta name="color-scheme" content="light">
<title>🧠 AI 发展日报</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue",
                 Arial, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ── Header ── */
header {
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    color: #fff;
    padding: 48px 24px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
}

header::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(
        circle at 30% 70%,
        rgba(255, 255, 255, 0.03) 0%,
        transparent 50%
    ),
    radial-gradient(
        circle at 70% 30%,
        rgba(255, 255, 255, 0.04) 0%,
        transparent 50%
    );
    pointer-events: none;
}

header h1 {
    font-size: 2.2em;
    font-weight: 700;
    letter-spacing: 0.02em;
    position: relative;
    z-index: 1;
}

header p {
    margin-top: 8px;
    font-size: 0.95em;
    opacity: 0.7;
    position: relative;
    z-index: 1;
}

/* ── Stats Bar ── */
.stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    padding: 16px 24px;
    background: #f8f9fa;
    border-bottom: 1px solid #e9ecef;
    font-size: 0.88em;
    color: #6b7280;
}

.stats-bar span {
    white-space: nowrap;
}

.stats-bar .stat-num {
    font-weight: 700;
    color: #302b63;
}

/* ── Main Content ── */
main {
    flex: 1;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 20px 48px;
}

/* ── Date Section ── */
.date-section {
    margin-bottom: 40px;
}

.date-section h2 {
    font-size: 1.15em;
    font-weight: 600;
    color: #374151;
    padding-bottom: 10px;
    border-bottom: 2px solid #e5e7eb;
    margin-bottom: 16px;
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 2;
}

/* ── News Card ── */
.news-list {
    list-style: none;
}

.news-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 10px;
    transition: background 0.15s ease;
    margin-bottom: 2px;
}

.news-item:hover {
    background: #f9fafb;
}

.source-badge {
    flex-shrink: 0;
    display: inline-block;
    padding: 2px 10px;
    border-radius: 5px;
    font-size: 0.78em;
    font-weight: 600;
    color: #fff;
    line-height: 1.6;
    white-space: nowrap;
    margin-top: 1px;
}

.news-item a {
    color: #1a1a1a;
    text-decoration: none;
    font-size: 0.98em;
    font-weight: 500;
    transition: color 0.15s ease;
    word-break: break-word;
}

.news-item a:hover {
    color: #302b63;
}

.news-item a::after {
    content: " ↗";
    font-size: 0.75em;
    opacity: 0.35;
}

/* ── Empty State ── */
.empty-state {
    text-align: center;
    padding: 80px 24px;
    color: #9ca3af;
}

.empty-state .icon {
    font-size: 3em;
    margin-bottom: 16px;
}

.empty-state p {
    font-size: 1.05em;
}

/* ── Footer ── */
footer {
    text-align: center;
    padding: 28px 24px;
    font-size: 0.82em;
    color: #9ca3af;
    border-top: 1px solid #f0f0f0;
    margin-top: auto;
}

footer p + p {
    margin-top: 4px;
}

footer .error-item {
    color: #d32f2f;
    font-size: 0.9em;
    margin-top: 2px;
}

/* ── Responsive ── */
@media (max-width: 640px) {
    header { padding: 32px 20px 28px; }
    header h1 { font-size: 1.6em; }
    main { padding: 20px 14px 32px; }
    .stats-bar { gap: 16px; font-size: 0.8em; }
    .news-item { padding: 12px 10px; gap: 10px; }
    .source-badge { font-size: 0.72em; padding: 1px 8px; }
    .news-item a { font-size: 0.92em; }
}
</style>
</head>
<body>

<header>
    <h1>🧠 AI 发展日报</h1>
    <p>每日自动聚合 AI 领域最新资讯 · 北京时间 8:00 更新</p>
</header>

<div class="stats-bar">
    <span>📰 <span class="stat-num">—</span> 条新闻</span>
    <span>📡 <span class="stat-num">—</span> 源正常</span>
    <span>📆 保留最近 <span class="stat-num">7</span> 天</span>
</div>

<main>
    <div class="empty-state">
        <div class="icon">⏳</div>
        <p>正在等待首次数据抓取...</p>
        <p style="font-size:0.88em;margin-top:8px;">
            每天早上 8:00（北京时间）自动更新，或
            <a href="https://github.com/OWNER/REPO/actions/workflows/ai-news.yml"
               target="_blank" rel="noopener">手动触发更新</a>。
        </p>
    </div>
</main>

<footer>
    <p>🕐 页面创建时间：2026-06-07 20:15:00（北京时间）</p>
    <p>数据来源：OpenAI · Hugging Face · Google AI · MIT Tech Review · Anthropic · 机器之心 · 36氪 · 量子位</p>
    <p style="margin-top:8px;">
        Powered by GitHub Actions · 自动更新 · RSS 聚合
    </p>
</footer>

</body>
</html>
